<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCX Change Enablement Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Poppins Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        .selection-indigo::selection { background: #e0e7ff; color: #312e81; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection-indigo overflow-hidden">

    <div class="flex h-screen w-full">
        <!-- SIDEBAR -->
        <aside class="w-72 border-r border-slate-200 bg-white flex flex-col z-20 shadow-[20px_0_40px_rgba(0,0,0,0.02)]">
            <div class="p-8">
                <div class="flex items-center gap-4 mb-14">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-2xl shadow-indigo-200">G</div>
                    <div class="leading-none">
                        <p class="font-black text-xl tracking-tighter text-slate-900">GCX Change</p>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-0.5">Enablement Suite</p>
                    </div>
                </div>
                
                <nav class="space-y-1.5" id="sidebar-nav">
                    <!-- Nav items injected by JS -->
                </nav>
            </div>
            
            <div class="mt-auto p-6 border-t border-slate-50 bg-slate-50/30">
                <div class="p-4 bg-white border border-slate-100 rounded-[1.5rem] flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center text-indigo-600 font-bold shadow-inner">
                       <i data-lucide="user-circle" class="w-7 h-7"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-black text-slate-900 truncate tracking-tight">Alex Thompson</p>
                        <p id="current-role-label" class="text-[9px] font-black text-slate-400 uppercase tracking-widest truncate">Change Lead</p>
                    </div>
                    <button class="text-slate-300 hover:text-slate-600 transition-colors"><i data-lucide="settings" class="w-4 h-4"></i></button>
                </div>
            </div>
        </aside>

        <!-- MAIN WORKSPACE -->
        <main class="flex-1 flex flex-col relative overflow-hidden">
            <header class="h-20 border-b border-slate-200 bg-white/80 backdrop-blur-xl flex items-center justify-between px-10 z-10 shrink-0">
                <div class="flex items-center gap-6">
                    <div class="bg-slate-100 p-1.5 rounded-full flex border border-slate-200 shadow-inner" id="role-switcher">
                        <!-- Buttons injected by JS -->
                    </div>
                </div>

                <div class="flex items-center gap-5">
                    <button onclick="toggleAI()" class="flex items-center gap-3 px-5 py-2.5 bg-indigo-50 text-indigo-700 rounded-2xl text-[10px] font-black uppercase tracking-widest border border-indigo-100 transition-all hover:bg-indigo-100 active:scale-95 group">
                        <i data-lucide="zap" class="w-4 h-4 fill-current group-hover:scale-110 transition-transform"></i> 
                        AI Assistant
                    </button>
                    <div class="h-6 w-[1px] bg-slate-200 mx-1"></div>
                    <button class="p-2 text-slate-400 hover:text-indigo-600 transition-colors relative">
                       <i data-lucide="bell" class="w-5 h-5"></i>
                       <div class="absolute top-1.5 right-1.5 w-2.5 h-2.5 bg-rose-500 border-2 border-white rounded-full"></div>
                    </button>
                </div>
            </header>

            <!-- DYNAMIC CONTENT AREA -->
            <div id="content-area" class="flex-1 overflow-y-auto p-10 lg:p-14 bg-[#F9FAFB]/50">
                <!-- Content injected here -->
            </div>

            <!-- AI DRAWER -->
            <div id="ai-drawer" class="fixed top-20 right-0 bottom-0 w-96 bg-white border-l border-slate-200 shadow-[0_0_100px_rgba(0,0,0,0.1)] z-30 transform translate-x-full transition-transform duration-500 flex flex-col">
                <div class="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/80">
                    <div class="flex items-center gap-3">
                        <i data-lucide="sparkles" class="w-5 h-5 text-indigo-600"></i>
                        <span class="font-black text-sm tracking-tight uppercase text-slate-800">Enablement AI</span>
                    </div>
                    <button onclick="toggleAI()" class="text-slate-300 hover:text-slate-900 text-3xl font-light transition-colors">&times;</button>
                </div>
                <div class="flex-1 overflow-y-auto p-6 space-y-6">
                    <div class="p-5 bg-indigo-600 text-white rounded-[1.5rem] rounded-tl-none shadow-xl text-xs leading-relaxed font-medium shadow-indigo-200">
                        Hi Alex! I've analyzed the current portfolio. <strong>October 15th</strong> is looking risky. Would you like me to simulate a staggered rollout for "Project Phoenix"?
                    </div>
                </div>
                <div class="p-6 border-t border-slate-100">
                    <div class="relative group">
                        <input type="text" placeholder="Ask for strategy help..." class="w-full pl-5 pr-12 py-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-medium focus:ring-4 focus:ring-indigo-50 outline-none transition-all">
                        <button class="absolute right-4 top-1/2 -translate-y-1/2 text-indigo-600"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- DATA & STATE ---
        const state = {
            activeTab: 'dashboard',
            role: 'Change Lead',
            aiOpen: false,
            intakeStep: 1,
            intakeData: {
                title: "", objective: "", type: "Technology", audience: 150, complexity: 3, 
                before: "", after: "", goLive: "2024-11-15", metrics: []
            }
        };

        const NAV_ITEMS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
            { id: 'intake', label: 'Change Intake', icon: 'plus-circle' },
            { id: 'portfolio', label: 'Active Portfolio', icon: 'file-text' },
            { id: 'toolkit', label: 'Toolkit Library', icon: 'book-open' }
        ];

        const ROLES = ['Leader', 'Manager', 'Change Lead'];

        const CHANGE_INITIATIVES = [
            { id: 1, title: "Project Phoenix: CRM Migration", status: "Amber", health: 65, audience: "Customer Support", timeline: "Q3 2024", tier: "Tier A" },
            { id: 2, title: "Global Flex Work Policy", status: "Green", health: 92, audience: "All GCX", timeline: "Q2 2024", tier: "Tier B" },
            { id: 3, title: "AI-Assisted Ticketing Beta", status: "Green", health: 88, audience: "Technical Support", timeline: "Q4 2024", tier: "Tier A" },
            { id: 4, title: "Standardized Feedback Loop", status: "Red", health: 34, audience: "Team Leads", timeline: "Q3 2024", tier: "Tier C" },
        ];

        // --- CORE UI FUNCTIONS ---
        function renderSidebar() {
            const nav = document.getElementById('sidebar-nav');
            nav.innerHTML = NAV_ITEMS.map(item => `
                <button onclick="navigate('${item.id}')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all mb-2 group ${state.activeTab === item.id ? 'bg-indigo-600 text-white shadow-2xl shadow-indigo-100' : 'text-slate-500 hover:bg-slate-100'}">
                    <i data-lucide="${item.icon}" class="w-5 h-5 ${state.activeTab === item.id ? 'text-white' : 'text-slate-400 group-hover:text-indigo-600'}"></i>
                    <span class="font-black text-sm tracking-tight">${item.label}</span>
                </button>
            `).join('') + `
                <div class="pt-10">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-3">Intelligence</p>
                    <button onclick="navigate('activation')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all mb-2 group ${state.activeTab === 'activation' ? 'bg-indigo-600 text-white shadow-2xl' : 'text-slate-500 hover:bg-slate-100'}">
                        <i data-lucide="users" class="w-5 h-5 ${state.activeTab === 'activation' ? 'text-white' : 'text-slate-400 group-hover:text-indigo-600'}"></i>
                        <span class="font-black text-sm tracking-tight">Manager Hub</span>
                    </button>
                    <button onclick="navigate('analytics')" class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all mb-2 group ${state.activeTab === 'analytics' ? 'bg-indigo-600 text-white shadow-2xl' : 'text-slate-500 hover:bg-slate-100'}">
                        <i data-lucide="bar-chart-3" class="w-5 h-5 ${state.activeTab === 'analytics' ? 'text-white' : 'text-slate-400 group-hover:text-indigo-600'}"></i>
                        <span class="font-black text-sm tracking-tight">Analytics</span>
                    </button>
                </div>
            `;
            lucide.createIcons();
        }

        function renderHeader() {
            const switcher = document.getElementById('role-switcher');
            switcher.innerHTML = ROLES.map(r => `
                <button onclick="switchRole('${r}')" class="px-6 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${state.role === r ? 'bg-white text-indigo-600 shadow-md scale-[1.02]' : 'text-slate-500 hover:text-slate-800'}">
                    ${r}
                </button>
            `).join('');
            document.getElementById('current-role-label').innerText = state.role;
        }

        function navigate(tab) {
            state.activeTab = tab;
            renderSidebar();
            renderContent();
        }

        function switchRole(role) {
            state.role = role;
            renderHeader();
            renderContent();
        }

        function toggleAI() {
            state.aiOpen = !state.aiOpen;
            const drawer = document.getElementById('ai-drawer');
            drawer.style.transform = state.aiOpen ? 'translateX(0)' : 'translateX(100%)';
        }

        // --- PAGE RENDERING ---
        function renderContent() {
            const container = document.getElementById('content-area');
            container.innerHTML = '';
            
            switch(state.activeTab) {
                case 'dashboard': renderDashboard(container); break;
                case 'intake': renderIntake(container); break;
                case 'portfolio': renderPortfolio(container); break;
                case 'analytics': renderAnalytics(container); break;
                default: container.innerHTML = `<h1 class="text-4xl font-black">Coming Soon...</h1>`;
            }
            lucide.createIcons();
        }

        function renderDashboard(container) {
            container.innerHTML = `
                <div class="space-y-8 animate-in">
                    <div class="flex items-end justify-between">
                        <div>
                            <h1 class="text-4xl font-black text-slate-900 tracking-tighter italic">Command</h1>
                            <p class="text-slate-500 mt-1 font-medium italic">Strategic visibility into GCX Change.</p>
                        </div>
                        <button onclick="navigate('intake')" class="px-6 py-3 bg-indigo-600 text-white rounded-2xl font-black flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-xl">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> Input New Change
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        ${renderStatCard('Portfolio', '24', 'layers', 'indigo', '+12%')}
                        ${renderStatCard('Adoption', '92%', 'activity', 'emerald', 'Optimal')}
                        ${renderStatCard('Risks', '3', 'alert-circle', 'rose', 'Critical')}
                        ${renderStatCard('New', '7', 'clock', 'slate', 'Waitlist')}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-[2rem] p-8 shadow-sm">
                            <h4 class="font-black text-slate-800 mb-8">Saturation by Function</h4>
                            <div class="space-y-6">
                                ${renderBar('CS Global Support', 85, 'bg-rose-500')}
                                ${renderBar('Trust & Safety', 60, 'bg-amber-400')}
                                ${renderBar('Technical Ops', 45, 'bg-indigo-500')}
                            </div>
                        </div>
                        <div class="bg-slate-900 text-white rounded-[2rem] p-8 shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/10 rounded-full blur-3xl"></div>
                            <h4 class="font-black text-sm uppercase tracking-widest mb-8 flex items-center gap-2">
                                <i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i> AI Insights
                            </h4>
                            <div class="p-4 bg-white/5 border border-white/10 rounded-2xl mb-4">
                                <p class="text-xs leading-relaxed font-medium">Global Support shows high risk for mid-October. Staggering is recommended.</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStatCard(label, val, icon, color, trend) {
            return `
                <div class="bg-white border border-slate-200 rounded-[2rem] p-6 shadow-sm border-b-4 border-b-transparent hover:border-b-indigo-500 transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div class="p-2 rounded-xl bg-${color}-50 text-${color}-600"><i data-lucide="${icon}" class="w-5 h-5"></i></div>
                        <span class="px-2 py-0.5 rounded-full text-[10px] font-black uppercase bg-slate-100 text-slate-500">${trend}</span>
                    </div>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${label}</p>
                    <h3 class="text-3xl font-black text-slate-900 tracking-tighter mt-1">${val}</h3>
                </div>
            `;
        }

        function renderBar(label, width, color) {
            return `
                <div class="space-y-2">
                    <div class="flex justify-between text-xs font-bold text-slate-700"><span>${label}</span><span>${width}%</span></div>
                    <div class="h-2.5 w-full bg-slate-100 rounded-full overflow-hidden">
                        <div class="h-full ${color} transition-all duration-1000" style="width: ${width}%"></div>
                    </div>
                </div>
            `;
        }

        // --- INTAKE DESIGNER ---
        function renderIntake(container) {
            const step = state.intakeStep;
            const impact = calculateImpact();
            
            container.innerHTML = `
                <div class="max-w-5xl mx-auto space-y-10 animate-in">
                    <div class="flex items-center justify-between border-b border-slate-200 pb-8">
                        <div>
                            <h2 class="text-3xl font-black text-slate-900 tracking-tighter italic">Designer</h2>
                            <p class="text-slate-500 font-medium">Strategic Change Architecture.</p>
                        </div>
                        <div class="flex items-center gap-3">
                            ${[1,2,3,4,5,6].map(s => `
                                <div class="w-10 h-10 rounded-2xl flex items-center justify-center text-xs font-black border-2 transition-all 
                                    ${step === s ? 'bg-indigo-600 border-indigo-600 text-white shadow-xl ring-4 ring-indigo-50' : step > s ? 'bg-emerald-500 border-emerald-500 text-white' : 'bg-white border-slate-200 text-slate-400'}">
                                    ${step > s ? '<i data-lucide="check" class="w-4 h-4"></i>' : s}
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        <div class="lg:col-span-3 bg-white border border-slate-200 rounded-[2.5rem] p-10 shadow-sm min-h-[500px] flex flex-col">
                            ${renderStepContent(step)}
                            
                            <div class="flex justify-between mt-auto pt-10 border-t border-slate-100">
                                <button onclick="prevStep()" class="px-8 py-3 font-black text-slate-400 hover:text-slate-800 disabled:opacity-0" ${step===1 ? 'disabled':''}>Back</button>
                                <button onclick="nextStep()" class="px-10 py-4 bg-indigo-600 text-white rounded-[1.2rem] font-black shadow-2xl shadow-indigo-100 uppercase tracking-widest text-xs">
                                    ${step === 6 ? 'Publish' : 'Continue'}
                                </button>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-slate-900 text-white rounded-[2rem] p-8 shadow-xl">
                                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-6">Engine Telemetry</h4>
                                <div class="space-y-8">
                                    <div>
                                        <div class="flex justify-between text-[10px] font-black mb-3 text-slate-400 uppercase">
                                            <span>Impact Intensity</span>
                                            <span class="text-indigo-400">${impact}%</span>
                                        </div>
                                        <div class="h-2 bg-white/10 rounded-full overflow-hidden">
                                            <div class="h-full bg-indigo-500" style="width: ${impact}%"></div>
                                        </div>
                                    </div>
                                    <div class="pt-6 border-t border-white/5 space-y-4">
                                        <div class="flex justify-between items-center">
                                            <span class="text-[10px] font-black text-slate-500 uppercase">Risk Index</span>
                                            <span class="px-3 py-1 rounded-full text-[9px] font-black uppercase bg-emerald-500/20 text-emerald-400">Stable</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStepContent(step) {
            if (step === 1) return `
                <div class="space-y-8">
                    <div><span class="px-3 py-1 rounded-full text-[9px] font-black uppercase bg-indigo-50 text-indigo-700 border border-indigo-200">Step 1: Discovery</span><h3 class="text-2xl font-black mt-2">What is the core mandate?</h3></div>
                    <div class="space-y-6">
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Initiative Name</label>
                        <input type="text" onchange="updateIntake('title', this.value)" value="${state.intakeData.title}" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-50 font-black text-lg outline-none" placeholder="e.g. AI-Assisted QA Feedback"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Primary Objective</label>
                        <textarea class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl min-h-[120px] outline-none" placeholder="Define the problem...">${state.intakeData.objective}</textarea></div>
                    </div>
                </div>
            `;
            if (step === 3) return `
                <div class="space-y-8">
                    <h3 class="text-2xl font-black">Shift Architecture</h3>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-3"><p class="text-[10px] font-black text-rose-500 uppercase tracking-widest">Status Quo</p>
                        <textarea class="w-full p-5 bg-rose-50/30 border border-rose-100 rounded-2xl min-h-[200px] outline-none text-sm font-medium" placeholder="Current manual lookup..."></textarea></div>
                        <div class="space-y-3"><p class="text-[10px] font-black text-emerald-500 uppercase tracking-widest">Desired State</p>
                        <textarea class="w-full p-5 bg-emerald-50/30 border border-emerald-100 rounded-2xl min-h-[200px] outline-none text-sm font-black" placeholder="AI Sidebar usage..."></textarea></div>
                    </div>
                </div>
            `;
            if (step === 6) {
                const impact = calculateImpact();
                return `
                    <div class="space-y-8 animate-in">
                        <div class="text-center"><div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="shield-check" class="w-8 h-8"></i></div><h2 class="text-2xl font-black tracking-tight">Strategic Summary</h2></div>
                        <div class="bg-slate-900 text-white rounded-[2rem] p-10 relative overflow-hidden shadow-2xl">
                             <div class="absolute top-0 right-0 w-64 h-64 bg-indigo-500/10 rounded-full blur-[80px]"></div>
                             <div class="relative z-10 space-y-10">
                                <div class="flex justify-between border-b border-white/10 pb-8">
                                    <div><Badge variant="purple" class="bg-purple-900/50 text-purple-200 px-3 py-1 rounded-full text-[9px] font-black uppercase">Change Protocol</Badge>
                                    <h4 class="text-4xl font-black mt-4 italic tracking-tighter">${state.intakeData.title || 'Untitled Initiative'}</h4></div>
                                    <div class="text-right"><p class="text-[10px] font-black text-slate-500 uppercase">Impact</p><span class="text-6xl font-black text-indigo-400">${impact}</span></div>
                                </div>
                                <div class="grid grid-cols-3 gap-6">
                                    <div class="bg-white/5 p-5 rounded-3xl"><p class="text-[10px] font-black text-indigo-400 uppercase mb-2">Service Tier</p><span class="text-sm font-black">Tier A</span></div>
                                    <div class="bg-white/5 p-5 rounded-3xl"><p class="text-[10px] font-black text-emerald-400 uppercase mb-2">Audience</p><span class="text-sm font-black">150 Staff</span></div>
                                </div>
                             </div>
                        </div>
                    </div>
                `;
            }
            return `<div class="py-20 text-center"><i data-lucide="zap" class="w-12 h-12 text-indigo-600 animate-pulse mx-auto"></i><p class="text-slate-400 font-black mt-4 uppercase text-xs">Simulating Step ${step} Strategy...</p></div>`;
        }

        // --- ANALYTICS VIEW ---
        function renderAnalytics(container) {
            container.innerHTML = `
                <div class="space-y-16 animate-in">
                    <div class="flex justify-between items-end">
                        <div>
                            <h1 class="text-7xl font-black text-slate-900 tracking-tighter italic">Intel</h1>
                            <p class="text-slate-400 font-black text-xl uppercase tracking-[0.3em] opacity-50">Telemetry & Sentiment</p>
                        </div>
                        <div class="flex gap-4">
                            <button class="px-8 py-4 bg-white border border-slate-200 rounded-[1.5rem] text-[10px] font-black uppercase shadow-sm">Last 90 Days</button>
                            <button class="px-10 py-4 bg-slate-900 text-white rounded-[1.5rem] text-[10px] font-black uppercase shadow-2xl">Export CSV</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-4 gap-10">
                        ${renderBigMetric('Adoption Rate', '78.2%', 'activity', 'indigo', '+4%')}
                        ${renderBigMetric('Sentiment', '84/100', 'thumbs-up', 'emerald', '+12%')}
                        ${renderBigMetric('Buy-in', '91%', 'users', 'purple', 'Stable')}
                        ${renderBigMetric('Risk', 'Normal', 'alert-circle', 'rose', 'Low')}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                        <div class="lg:col-span-2 bg-white border border-slate-200 rounded-[3rem] p-12 shadow-sm">
                            <h4 class="text-3xl font-black tracking-tighter italic mb-12">Readiness Timeline</h4>
                            <div class="h-64 flex items-end justify-between gap-6 px-4">
                                ${[45, 52, 60, 58, 75, 88, 92, 90].map((v, i) => `
                                    <div class="flex-1 flex flex-col justify-end gap-2 relative group">
                                        <div class="w-full bg-indigo-600 rounded-t-2xl transition-all duration-1000 shadow-xl" style="height: ${v}%"></div>
                                        <p class="text-[10px] font-black text-slate-400 mt-4 text-center">W${i+1}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="bg-white border border-slate-200 rounded-[3rem] p-12 shadow-sm flex flex-col">
                            <h4 class="text-3xl font-black tracking-tighter italic flex items-center gap-4 mb-16">
                                <i data-lucide="brain-circuit" class="w-8 h-8 text-purple-600"></i> Sentiment
                            </h4>
                            <div class="space-y-12">
                                ${renderSentimentBar('Positive', 65, 'bg-emerald-500')}
                                ${renderSentimentBar('Neutral', 28, 'bg-amber-400')}
                                ${renderSentimentBar('Resistance', 7, 'bg-rose-500')}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderBigMetric(l, v, i, c, t) {
            return `
                <div class="bg-white border border-slate-200 rounded-[2.5rem] p-10 shadow-sm border-b-[12px] border-b-transparent hover:border-b-indigo-500 transition-all">
                    <div class="w-16 h-16 rounded-[1.5rem] bg-${c}-50 text-${c}-600 flex items-center justify-center mb-8 shadow-inner"><i data-lucide="${i}" class="w-8 h-8"></i></div>
                    <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest leading-none mb-3">${l}</p>
                    <h3 class="text-5xl font-black text-slate-900 tracking-tighter leading-none">${v}</h3>
                    <p class="text-[10px] font-black text-emerald-500 mt-4 uppercase">${t}</p>
                </div>
            `;
        }

        function renderSentimentBar(l, v, c) {
            return `
                <div>
                    <div class="flex justify-between text-[11px] font-black mb-4 uppercase"><span>${l}</span><span>${v}%</span></div>
                    <div class="h-3 bg-slate-50 rounded-full overflow-hidden border border-slate-100"><div class="h-full ${c} transition-all" style="width: ${v}%"></div></div>
                </div>
            `;
        }

        // --- PORTFOLIO VIEW ---
        function renderPortfolio(container) {
            container.innerHTML = `
                <div class="space-y-12 animate-in">
                    <h1 class="text-7xl font-black tracking-tighter italic">Portfolio</h1>
                    <div class="bg-white border border-slate-200 rounded-[3rem] overflow-hidden shadow-2xl">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 border-b border-slate-100">
                                <tr>
                                    <th class="px-12 py-8 text-[11px] font-black text-slate-400 uppercase tracking-widest">Architecture</th>
                                    <th class="px-12 py-8 text-[11px] font-black text-slate-400 uppercase tracking-widest">Tier</th>
                                    <th class="px-12 py-8 text-[11px] font-black text-slate-400 uppercase tracking-widest">Readiness</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-50">
                                ${CHANGE_INITIATIVES.map(item => `
                                    <tr class="hover:bg-slate-50 transition-all">
                                        <td class="px-12 py-10"><p class="text-2xl font-black text-slate-900 italic tracking-tighter">${item.title}</p></td>
                                        <td class="px-12 py-10"><span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase border ${item.tier === 'Tier A' ? 'bg-rose-50 text-rose-700 border-rose-100' : 'bg-indigo-50 text-indigo-700'}">${item.tier}</span></td>
                                        <td class="px-12 py-10">
                                            <div class="flex items-center gap-6">
                                                <div class="flex-1 h-4 w-48 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                                    <div class="h-full bg-indigo-600 shadow-xl" style="width: ${item.health}%"></div>
                                                </div>
                                                <span class="text-[11px] font-black text-slate-500 uppercase">${item.health}%</span>
                                            </div>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        // --- INTAKE LOGIC ---
        function calculateImpact() {
            let score = (state.intakeData.complexity * 15);
            if (state.intakeData.audience > 500) score += 20;
            return Math.min(score, 100);
        }

        function nextStep() {
            if (state.intakeStep < 6) {
                state.intakeStep++;
                renderContent();
            } else {
                navigate('dashboard');
                state.intakeStep = 1;
            }
        }

        function prevStep() {
            if (state.intakeStep > 1) {
                state.intakeStep--;
                renderContent();
            }
        }

        function updateIntake(key, val) {
            state.intakeData[key] = val;
            renderContent();
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderHeader();
            renderContent();
        });
    </script>
</body>
</html>
