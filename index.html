<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCX Change Platform</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
</style>
</head>

<body class="bg-slate-50">

<div class="flex h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-white border-r p-6">
<h2 class="font-bold text-xl mb-6">GCX Change</h2>

<button onclick="showPage('dashboard')" class="block mb-3">Dashboard</button>
<button onclick="showPage('intake')" class="block mb-3">Change Intake</button>
<button onclick="showPage('portfolio')" class="block mb-3">Portfolio</button>

</aside>

<!-- MAIN -->
<div class="flex-1 p-8 overflow-y-auto">

<div id="dashboard">
<h1 class="text-3xl font-bold mb-4">Dashboard</h1>
<p>Overview of change portfolio</p>
</div>

<div id="intake" class="hidden">
<h1 class="text-3xl font-bold mb-6">Strategic Change Designer</h1>

<input id="title" placeholder="Initiative name" class="border p-2 mb-4 w-full">
<textarea id="objective" placeholder="Objective" class="border p-2 mb-4 w-full"></textarea>

<button onclick="generateSummary()" class="bg-indigo-600 text-white px-4 py-2 rounded">
Generate Summary
</button>

<div id="summary" class="mt-6"></div>
</div>

<div id="portfolio" class="hidden">
<h1 class="text-3xl font-bold mb-4">Portfolio</h1>
<p>List of changes</p>
</div>

</div>
</div>

<script>

function showPage(page){
document.getElementById('dashboard').classList.add('hidden')
document.getElementById('intake').classList.add('hidden')
document.getElementById('portfolio').classList.add('hidden')

document.getElementById(page).classList.remove('hidden')
}

function generateSummary(){
const title = document.getElementById('title').value
const objective = document.getElementById('objective').value

document.getElementById('summary').innerHTML = `
<div class="p-4 bg-white shadow rounded mt-4">
<h2 class="font-bold text-lg">${title}</h2>
<p>${objective}</p>
</div>
`
}

lucide.createIcons()

</script>

</body>
</html>
